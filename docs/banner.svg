<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Per-provider glow (radial) -->
    <radialGradient id="glowAWS"   cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff9900" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAzure" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0078d4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0078d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGCP"   cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34a853" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#34a853" stop-opacity="0"/>
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6edf3"/>
      <stop offset="70%"  stop-color="#c9d1d9"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>

    <!-- Tri-colour separator / bottom stripe -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff9900" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ff9900"/>
      <stop offset="50%"  stop-color="#0078d4"/>
      <stop offset="85%"  stop-color="#34a853"/>
      <stop offset="100%" stop-color="#34a853" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip to rounded rect -->
    <clipPath id="roundClip">
      <rect width="900" height="220" rx="14" ry="14"/>
    </clipPath>

  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="900" height="220" rx="14" ry="14" fill="url(#bg)"/>

  <!-- ── Border ────────────────────────────────────────────────────── -->
  <rect width="900" height="220" rx="14" ry="14"
        fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- ── Subtle grid ────────────────────────────────────────────────── -->
  <g clip-path="url(#roundClip)" opacity="0.035" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0"   y1="55"  x2="900" y2="55"/>
    <line x1="0"   y1="110" x2="900" y2="110"/>
    <line x1="0"   y1="165" x2="900" y2="165"/>
    <line x1="220" y1="0"   x2="220" y2="220"/>
    <line x1="450" y1="0"   x2="450" y2="220"/>
    <line x1="625" y1="0"   x2="625" y2="220"/>
  </g>

  <!-- ── Provider glow blobs ─────────────────────────────────────────── -->
  <!-- Left zone: AWS warm glow -->
  <ellipse cx="110" cy="110" rx="110" ry="80" fill="url(#glowAWS)"   opacity="0.8"/>
  <!-- Centre zone: Azure cool glow -->
  <ellipse cx="423" cy="110" rx="140" ry="80" fill="url(#glowAzure)" opacity="0.6"/>
  <!-- Right zone: GCP green glow -->
  <ellipse cx="762" cy="110" rx="110" ry="80" fill="url(#glowGCP)"   opacity="0.7"/>


  <!-- ═══════════════════════════════════════════════════════════════════
       ZONE A  ·  LEFT  ·  x 0 – 220
       Shield icon + three provider badges
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Shield body (centred at x=110) -->
  <path d="M88 36 L132 36 L140 46 L140 96 Q140 124 110 138 Q80 124 80 96 L80 46 Z"
        fill="url(#shieldGrad)" opacity="0.12"/>
  <path d="M88 36 L132 36 L140 46 L140 96 Q140 124 110 138 Q80 124 80 96 L80 46 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="1.8" opacity="0.85"/>

  <!-- Shield check-mark -->
  <polyline points="94,88  106,102  128,68"
            fill="none" stroke="#58a6ff" stroke-width="3.2"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!--
    Three provider badges — contained within x=14 … x=204 (190 px)
    Badge width = 58 px, gap = 8 px  ·  3×58 + 2×8 = 190 px  ✓
  -->

  <!-- AWS badge: x=14 … 72, centre=43 -->
  <rect x="14" y="152" width="58" height="24" rx="5"
        fill="#1a1e24" stroke="#ff9900" stroke-width="1.2"/>
  <text x="43" y="168" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" font-weight="700" fill="#ff9900"
        text-anchor="middle" letter-spacing="0.6">AWS</text>

  <!-- Azure badge: x=80 … 138, centre=109 -->
  <rect x="80" y="152" width="58" height="24" rx="5"
        fill="#1a1e24" stroke="#0078d4" stroke-width="1.2"/>
  <text x="109" y="168" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" font-weight="700" fill="#0078d4"
        text-anchor="middle" letter-spacing="0.6">AZURE</text>

  <!-- GCP badge: x=146 … 204, centre=175 -->
  <rect x="146" y="152" width="58" height="24" rx="5"
        fill="#1a1e24" stroke="#34a853" stroke-width="1.2"/>
  <text x="175" y="168" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" font-weight="700" fill="#34a853"
        text-anchor="middle" letter-spacing="0.6">GCP</text>


  <!-- ═══════════════════════════════════════════════════════════════════
       ZONE B  ·  CENTRE  ·  x 225 – 622
       Title · separator · subtitle · stat pills
       All elements centred at x=423
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Main title (font-size 28 → ~384 px wide, stays within 225–622) -->
  <text x="423" y="84"
        font-family="'Segoe UI',Roboto,'Helvetica Neue',sans-serif"
        font-size="28" font-weight="700" fill="url(#titleGrad)"
        text-anchor="middle" letter-spacing="-0.3">
    MultiCloud Security Audit
  </text>

  <!-- Tri-colour separator line (x=232 … x=614) -->
  <rect x="232" y="96" width="382" height="2" rx="1" fill="url(#lineGrad)" opacity="0.75"/>

  <!-- Subtitle (font-size 12.5 → ~374 px wide, stays within 225–622) -->
  <text x="423" y="122"
        font-family="'Segoe UI',Roboto,sans-serif"
        font-size="12.5" font-weight="400" fill="#8b949e"
        text-anchor="middle" letter-spacing="0.2">
    Open-source Python security auditing for AWS · Azure · GCP
  </text>

  <!--
    Stat pills — three pills centred at x=423
    Widths: CIS=128  Checks=96  Read-only=86   gaps=8
    Total = 128+96+86 + 2×8 = 326 px
    Start x = 423 − 163 = 260   End x = 260 + 326 = 586  ✓ (within 225–622)
  -->

  <!-- Pill 1 — CIS Benchmark v3.0: x=260 … 388 -->
  <rect x="260" y="148" width="128" height="24" rx="12"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="277" cy="160" r="5" fill="#ff9900" opacity="0.85"/>
  <text x="290" y="164.5" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" fill="#8b949e">CIS Benchmark v3.0</text>

  <!-- Pill 2 — 140+ Checks: x=396 … 492 -->
  <rect x="396" y="148" width="96" height="24" rx="12"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="413" cy="160" r="5" fill="#58a6ff" opacity="0.85"/>
  <text x="426" y="164.5" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" fill="#8b949e">140+ Checks</text>

  <!-- Pill 3 — Read-only: x=500 … 586 -->
  <rect x="500" y="148" width="86" height="24" rx="12"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="517" cy="160" r="5" fill="#34a853" opacity="0.85"/>
  <text x="530" y="164.5" font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" fill="#8b949e">Read-only</text>


  <!-- ═══════════════════════════════════════════════════════════════════
       ZONE A/B divider  ·  x=220
       ═══════════════════════════════════════════════════════════════════ -->
  <line x1="220" y1="30" x2="220" y2="190"
        stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════════════════════════════════════════════
       ZONE B/C divider  ·  x=626
       ═══════════════════════════════════════════════════════════════════ -->
  <line x1="626" y1="30" x2="626" y2="190"
        stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>


  <!-- ═══════════════════════════════════════════════════════════════════
       ZONE C  ·  RIGHT  ·  x 627 – 900
       Decorative cloud-circuit art · centred at x=762
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Cloud outline group — translate so art fits x=635…895 -->
  <g transform="translate(698,28)" opacity="0.52">
    <!-- Three overlapping cloud ellipses -->
    <ellipse cx="64" cy="50" rx="46" ry="30" fill="none" stroke="#30363d" stroke-width="1.4"/>
    <ellipse cx="40" cy="60" rx="30" ry="22" fill="none" stroke="#30363d" stroke-width="1"/>
    <ellipse cx="88" cy="58" rx="28" ry="20" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Connector lines (dashed) -->
    <line x1="24"  y1="72" x2="64"  y2="82" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="64"  y1="82" x2="100" y2="72" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="64"  y1="18" x2="64"  y2="32" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="24"  y1="72" x2="64"  y2="18" stroke="#484f58" stroke-width="0.7" stroke-dasharray="2,4" opacity="0.5"/>
    <line x1="100" y1="72" x2="64"  y2="18" stroke="#484f58" stroke-width="0.7" stroke-dasharray="2,4" opacity="0.5"/>

    <!-- Provider-coloured nodes -->
    <circle cx="24"  cy="72" r="5" fill="#ff9900" opacity="0.90"/>   <!-- AWS -->
    <circle cx="64"  cy="82" r="5" fill="#0078d4" opacity="0.90"/>   <!-- Azure -->
    <circle cx="100" cy="72" r="5" fill="#34a853" opacity="0.90"/>   <!-- GCP -->
    <circle cx="64"  cy="18" r="4" fill="#58a6ff" opacity="0.85"/>   <!-- Core -->
  </g>

  <!-- Version / licence text in right zone -->
  <text x="762" y="156"
        font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" fill="#484f58"
        text-anchor="middle" letter-spacing="0.3">
    Python 3.10+
  </text>
  <text x="762" y="172"
        font-family="'Segoe UI',Roboto,sans-serif"
        font-size="10.5" fill="#484f58"
        text-anchor="middle" letter-spacing="0.3">
    MIT License
  </text>


  <!-- ── Bottom accent stripe ───────────────────────────────────────── -->
  <rect x="0" y="216" width="900" height="4" rx="0"
        fill="url(#lineGrad)" clip-path="url(#roundClip)" opacity="0.65"/>

</svg>
